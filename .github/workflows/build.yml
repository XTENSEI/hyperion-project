name: Build Android Binaries & Module

on:
  push:
    branches: [ main, master ]
    paths:
      - 'hyperion/core/*.c'
      - 'hyperion/core/Makefile'
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
      - name: Build binaries
        run: |
          cd hyperion/core
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          make clean
          make android
      
      - name: Copy binaries
        run: |
          mkdir -p hyperion/system/bin
          cp hyperion/core/hyperiond-arm64 hyperion/system/bin/
          cp hyperion/core/hyperiond-arm7 hyperion/system/bin/
          cp hyperion/core/hyperiond-x86 hyperion/system/bin/
          cp hyperion/core/hyperiond-x86_64 hyperion/system/bin/
          cp hyperion/core/hyperion-arm64 hyperion/system/bin/hyperion
          cp hyperion/core/hyperion-arm7 hyperion/system/bin/hyperion
          cp hyperion/core/hyperion-x86 hyperion/system/bin/hyperion
          cp hyperion/core/hyperion-x86_64 hyperion/system/bin/hyperion
          cd hyperion/system/bin
          ln -sf hyperiond-arm64 hyperiond
          ln -sf hyperion-arm64 hyperion
          ls -la
      
      - name: Create module zip
        run: |
          cd hyperion
          rm -f ../hyperion-module.zip
          zip -r9 ../hyperion-module.zip . -x "*.git*"
          cd ..
          ls -la hyperion-module.zip
          unzip -t hyperion-module.zip | head -20
      
      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-module
          path: hyperion-module.zip
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: hyperion-module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
